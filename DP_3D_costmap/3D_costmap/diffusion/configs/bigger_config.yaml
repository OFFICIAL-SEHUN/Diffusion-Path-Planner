# =============================================================================
# Diffusion-based Path Planning for Gradient Terrain
# Configuration File
# =============================================================================

# --- General Settings ---
project_name: "GradientTerrainDiffusionPlanner"
seed: 42

# --- Data Generation ---
data:
  num_samples: 1        # Number of terrains to generate
  paths_per_terrain: 1      # Number of different paths per terrain (total paths = num_samples × paths_per_terrain)
  img_size: 200            # Terrain map size (height and width in pixels)
  horizon: 120            # Number of waypoints in trajectory
  # sample_per_epoch: 5000  # Samples to use per training epoch
  cost_weight: 50.0       # Weight for energy cost in path planning (not used in gradient mode)

# --- Gradient Terrain Generation ---
gradient:
  height_range: [0, 30]                   # Height range in meters - 높이 차이 크게!
  # terrain_scales: [[scale, weight], ...] - 큰 weight = 급격한 높이 변화
  terrain_scales: [[80, 40], [50, 20], [30, 10]]  # 장애물 같은 복잡한 지형
  # EXTREME (too hard): [[150,80], [100,60], [70,50], [50,40], [35,35], [25,30], [18,25], [12,20], [8,15], [5,10], [3,8], [2,5]]
  # SIMPLE (too easy): [[80, 30], [50, 20], [30, 10]]
  mass: 10.0                               # Robot mass in kg
  gravity: 9.8                             # Gravity acceleration in m/s^2
  limit_angle_deg: 28                      # Maximum climbable angle - 엄격하게! (40→28)
  pixel_resolution: 0.5                    # Pixel resolution in m/pixel (100 pixels = 50m)

# --- Diffusion Process ---
diffusion:
  timesteps: 200          # Number of diffusion steps (T)
  beta_start: 0.0001      # Initial noise level (β_1)
  beta_end: 0.02          # Final noise level (β_T)
  # Linear schedule: β_t increases linearly from beta_start to beta_end

# --- Model Architecture ---
model:
  # U-Net based conditional diffusion model
  base_dim: 64            # Base channel dimension
  time_embed_dim: 256     # Time embedding dimension
  image_feat_dim: 256     # Visual encoder output dimension
  # Visual encoder: CNN that processes gradient terrain costmap
  # Conditioning: Time + Visual features combined

# --- Training Configuration ---
training:
  epochs: 5000             # Total training epochs
  batch_size: 64            # Batch size
  learning_rate: 0.0001     # Adam optimizer learning rate
  
  # Checkpointing
  checkpoint_dir: "checkpoints"
  model_name: "epoch_4000_gradient_path_model.pt"  # Final model filename
  
  # Logging
  log_interval: 1000        # Save checkpoint and visualize every N epochs
  # WandB project: "diffusion-gradient-path-planning"

# --- Inference Configuration ---
inference:
  # Sampling settings
  show_progress: true     # Show tqdm progress bar during sampling
  # Inpainting: Start/end positions are fixed during sampling
  # Model checkpoint will be loaded from: checkpoint_dir/model_name
