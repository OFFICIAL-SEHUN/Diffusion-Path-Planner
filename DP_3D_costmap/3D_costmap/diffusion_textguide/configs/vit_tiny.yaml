# =============================================================================
# Text-guided diffusion — ViT-Tiny (timm)
# =============================================================================
# Usage:
#   python train.py --config configs/vit_tiny.yaml --data-dir data/raw --val-dir data/valid
# Notes:
#   - Training reads existing .pt files from --data-dir.
#   - In `data`, only img_size/horizon are directly consumed by training.
#   - Non-224 `img_size` uses timm `dynamic_img_size`; H/W not divisible by the
#     patch size are zero-padded in `VisualEncoderTimm` (e.g. 100 → 112 for patch 16).
# =============================================================================

project_name: "DiffusionTextGuide_ViTTiny"
seed: 42

data:
  # Used directly in training/model shape
  img_size: 100
  horizon: 120

  # Generation metadata (used only when re-generating dataset)
  num_samples: 100
  paths_per_terrain: 100
  cost_weight: 50.0
  min_distance_factor: 1.5

gradient:
  height_range: [0, 5]
  terrain_scales: [[20,10],[10,5],[5,2]]
  mass: 10.0
  gravity: 9.8
  limit_angle_deg: 25
  pixel_resolution: 0.5
  max_iterations: 20000

intent:
  cost_weights:
    alpha: 0.5
    beta: 1.8
    gamma: 0.4
    delta: 2.0
  risk_threshold_deg: 15.0

diffusion:
  timesteps: 200
  beta_start: 0.0001
  beta_end: 0.02

model:
  base_dim: 128
  time_embed_dim: 256
  image_feat_dim: 256
  visual_backbone: vit_tiny
  timm_model_name: vit_tiny_patch16_224
  timm_pretrained: false

training:
  epochs: 5000
  batch_size: 128
  learning_rate: 0.00003
  checkpoint_dir: "checkpoints/vit_tiny_pretrained"
  model_name: "diffusion_textguide_vit_tiny.pt"
  log_interval: 1000
  use_amp: true

inference:
  show_progress: true

# ── Ablation logging ──────────────────────────────────────────────────────────
logging:
  val_loss_interval: 200      # compute held-out val loss every N epochs (cheap)
  val_interval: 1000          # full metrics every N epochs
  val_max_samples: 50         # max val-terrain samples used for full metric computation
  log_dir: "logs/ablation"
