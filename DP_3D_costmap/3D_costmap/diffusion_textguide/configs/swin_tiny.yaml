# =============================================================================
# Text-guided diffusion — Swin-Tiny visual backbone (timm, IN1K pretrained)
# =============================================================================
# Usage:
#   python train.py --config configs/swin_tiny.yaml --data-dir data/raw
# Inference loads visual_backbone from checkpoint config; this file is for training defaults.
# =============================================================================

project_name: "DiffusionTextGuide_SwinTiny"
seed: 42

data:
  num_samples: 100
  paths_per_terrain: 100
  img_size: 100
  horizon: 120
  cost_weight: 50.0
  min_distance_factor: 1.5

gradient:
  height_range: [0, 5]
  terrain_scales: [[20,10],[10,5],[5,2]]
  mass: 10.0
  gravity: 9.8
  limit_angle_deg: 25
  pixel_resolution: 0.5
  max_iterations: 20000

intent:
  cost_weights:
    alpha: 2.0
    beta: 1.5
    gamma: 0.5
    delta: 2.0
  risk_threshold_deg: 15.0

diffusion:
  timesteps: 200
  beta_start: 0.0001
  beta_end: 0.02

# --- Swin-Tiny only (timm model: swin_tiny_patch4_window7_224) ---
model:
  base_dim: 64
  time_embed_dim: 256
  image_feat_dim: 256
  visual_backbone: swin_tiny
  timm_model_name: swin_tiny_patch4_window7_224
  timm_pretrained: true

training:
  epochs: 10000
  batch_size: 64
  learning_rate: 0.00003
  checkpoint_dir: "checkpoints/swin_tiny"
  model_name: "diffusion_textguide_swin_tiny.pt"
  log_interval: 1000
  use_amp: true

inference:
  show_progress: true
