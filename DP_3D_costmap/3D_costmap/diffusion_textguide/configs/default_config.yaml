# =============================================================================
# Diffusion-based Path Planning for Gradient Terrain
# Configuration File
# =============================================================================

# --- General Settings ---
project_name: "GradientTerrainDiffusionPlanner"
seed: 42

# --- Data Generation ---
data:
  num_samples: 100       # Number of terrains to generate
  paths_per_terrain: 100      # Number of different paths per terrain (total paths = num_samples × paths_per_terrain)
  img_size: 100            # Terrain map size (height and width in pixels)
  horizon: 120            # Number of waypoints in trajectory
  # sample_per_epoch: 5000  # Samples to use per training epoch
  cost_weight: 50.0       # Weight for energy cost in path planning (not used in gradient mode)
  min_distance_factor: 1.5  # 시작/끝 지점 최소 거리 (img_size / min_distance_factor)
                            # 높을수록 더 가까이 배치 가능, 낮을수록 더 멀리 배치
                            # 2.0 → min_distance=50 (경로 탐색 성공률 향상), 1.0 → 100 (거의 대각선만)

# --- Gradient Terrain Generation ---
gradient:
  height_range: [0, 5]                    # Height range in meters (min, max) - 증가로 경사 증가
  # terrain_scales: [[scale, weight], ...] - 큰 weight = 급격한 높이 변화
  terrain_scales: [[20,10],[10,5],[5,2]]  # (smoothness, height_variation)
  # terrain_scales: [[10,5]]  # (smoothness, height_variation)
  mass: 10.0                               # Robot mass in kg
  gravity: 9.8                             # Gravity acceleration in m/s^2
  limit_angle_deg: 25                      # Maximum climbable angle in degrees (증가)
  pixel_resolution: 0.5                    # Pixel resolution in m/pixel (100 pixels = 50m)
  max_iterations: 20000                   # Maximum number of iterations for A* search

# --- Intent & Cost Weights (Section 6.4) ---
intent:
  cost_weights:
    alpha: 1.0        # distance weight (α)
    beta: 0.8         # CoT/energy weight (β)
    gamma: 0.1        # risk/safety weight (γ)
    delta: 1.0        # intent penalty scaling (δ)
  risk_threshold_deg: 15.0   # Risk_{ij} = max(0, slope - threshold)

# --- Diffusion Process ---
diffusion:
  timesteps: 200          # Number of diffusion steps (T)
  beta_start: 0.0001      # Initial noise level (β_1)
  beta_end: 0.02          # Final noise level (β_T)
  # Linear schedule: β_t increases linearly from beta_start to beta_end

# --- Model Architecture ---
model:
  # U-Net based conditional diffusion model
  base_dim: 64            # Base channel dimension
  time_embed_dim: 256     # Time embedding dimension
  image_feat_dim: 256     # Visual encoder output dimension
  # Visual encoder: CNN that processes gradient terrain costmap
  # Conditioning: Time + Visual features combined

# --- Training Configuration ---
training:
  epochs: 10000            # Total training epochs
  batch_size: 64            # Batch size
  learning_rate: 0.00003     # Adam optimizer learning rate
  
  # Checkpointing
  checkpoint_dir: "checkpoints/sample40k"
  model_name: "diffusion_textguide_model.pt"  # Final model filename
  
  # Logging
  log_interval: 10000        # Save checkpoint and visualize every N epochs
  # WandB project: "diffusion-gradient-path-planning"

# --- Inference Configuration ---
inference:
  # Sampling settings
  show_progress: true     # Show tqdm progress bar during sampling
  # Inpainting: Start/end positions are fixed during sampling
  # Model checkpoint will be loaded from: checkpoint_dir/model_name
